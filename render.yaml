services:
  - type: web
    name: agerinfo-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preStartCommand: python manage.py migrate && python manage.py shell -c "from django.contrib.auth.models import User; from rest_framework.authtoken.models import Token; u,_=User.objects.get_or_create(username='admin@agerinfo.com',defaults={'email':'admin@agerinfo.com','is_staff':True,'is_superuser':True}); u.set_password('admin123'); u.save(); Token.objects.get_or_create(user=u)"
    startCommand: gunicorn agerinfo_backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: "agerinfo-backend.onrender.com,localhost,127.0.0.1"
      - key: DATABASE_URL
        fromDatabase:
          name: agerinfo-db
          property: connectionString

  - type: postgres
    name: agerinfo-db
    databaseName: agerinfo_db
    plan: free
